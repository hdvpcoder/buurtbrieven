<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a1a; color: #eee; }
  #header {
    background: #21683a;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    z-index: 1000;
    position: relative;
  }
  #header h1 { font-size: 1.1rem; font-weight: 600; }
  #header .subtitle { font-size: 0.8rem; opacity: 0.8; }
  #stats {
    display: flex;
    gap: 20px;
    margin-left: auto;
    font-size: 0.8rem;
  }
  #stats .stat { text-align: center; }
  #stats .num { font-size: 1.2rem; font-weight: 700; }
  #map { height: calc(100vh - 54px); width: 100%; }

  /* Legend */
  .legend {
    background: rgba(30,30,30,0.92);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: #eee;
    min-width: 170px;
  }
  .legend h4 { font-size: 13px; margin-bottom: 8px; color: #fff; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .legend-box { width: 16px; height: 16px; border-radius: 3px; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; }

  /* Popup */
  .leaflet-popup-content-wrapper {
    background: #1e1e1e;
    color: #eee;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    border: 1px solid #444;
  }
  .leaflet-popup-tip { background: #1e1e1e; }
  .popup-pc { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
  .popup-sd { font-size: 0.75rem; color: #aaa; margin-bottom: 10px; }
  .popup-loper { padding: 6px 0; border-bottom: 1px solid #333; }
  .popup-loper:last-child { border-bottom: none; }
  .popup-naam { font-weight: 600; font-size: 0.95rem; }
  .popup-detail { font-size: 0.78rem; color: #bbb; margin-top: 2px; }
  .popup-conflict { color: #ff6b6b; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; }
  .popup-geen { color: #888; font-style: italic; font-size: 0.85rem; }
  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-left: 4px;
  }
  .tag-type { background: #2a4a2a; color: #7dcc7d; }

  /* Filter panel */
  #filter-panel {
    position: absolute;
    top: 70px;
    right: 12px;
    z-index: 999;
    background: rgba(30,30,30,0.93);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    min-width: 160px;
  }
  #filter-panel h4 { color: #fff; margin-bottom: 8px; font-size: 13px; }
  #filter-panel label { display: flex; align-items: center; gap: 7px; margin: 5px 0; cursor: pointer; }
  #filter-panel input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; }
</style>

  "Zuid":       "#0ea5a0",
  "Oost":       "#e84040",
  "Zuidoost":   "#d4a800",
  "Overig":     "#888888",
};
const CONFLICT_COLOR = "#ff1f1f";
const LOPER_OPACITY = 0.65;
const BASE_OPACITY  = 0.18;

function getStyle(feature) {
  const p = feature.properties;
  const sd = p.stadsdeel;
  const base = SD_COLORS[sd] || "#888";
  if (p.conflict) {
    return { fillColor: CONFLICT_COLOR, fillOpacity: 0.7, color: CONFLICT_COLOR, weight: 2.5, opacity: 1 };
  } else if (p.n_lopers === 1) {
    return { fillColor: base, fillOpacity: LOPER_OPACITY, color: base, weight: 2, opacity: 1 };
  } else {
    return { fillColor: base, fillOpacity: BASE_OPACITY, color: base, weight: 0.8, opacity: 0.6 };
  }
}

function makePopup(p) {
  let html = `<div class="popup-pc">${p.pc4}</div>`;
  html += `<div class="popup-sd">${p.stadsdeel}</div>`;
  if (p.conflict) html += `<div class="popup-conflict">⚠️ CONFLICT — ${p.n_lopers} lopers</div>`;
  if (p.n_lopers === 0) {
    html += `<div class="popup-geen">Geen loper</div>`;
  } else {
    p.lopers.forEach(l => {
      const stuks = l.stuks ? `${l.stuks} stuks · ` : '';
      html += `<div class="popup-loper">
        <div class="popup-naam">${l.naam}</div>
        <div class="popup-detail">${stuks}<span class="tag tag-type">${l.type}</span></div>
      </div>`;
    });
  }
  return html;
}

// ── Map init ─────────────────────────────────────────────
const map = L.map('map', {
  center: [52.37, 4.90],
  zoom: 12,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://carto.com">CARTO</a> © <a href="https://openstreetmap.org">OpenStreetMap</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ── GeoJSON layer ────────────────────────────────────────
let geoLayer = L.geoJSON(geojson, {
  style: getStyle,
  onEachFeature(feature, layer) {
    layer.bindPopup(makePopup(feature.properties), {maxWidth: 280});
    layer.on({
      mouseover(e) {
        const l = e.target;
        const p = feature.properties;
        if (!p.conflict) {
          l.setStyle({
            fillOpacity: p.n_lopers ? LOPER_OPACITY + 0.2 : BASE_OPACITY + 0.15,
            weight: p.n_lopers ? 3 : 1.5,
          });
        } else {
          l.setStyle({ fillOpacity: 0.85, weight: 3.5 });
        }
        l.bringToFront();
      },
      mouseout(e) { geoLayer.resetStyle(e.target); },
      click(e) { map.fitBounds(e.target.getBounds(), {padding: [40,40]}); },
    });
  }
}).addTo(map);

// ── Stats ────────────────────────────────────────────────
let totalLopers = 0, totalConflict = 0, totalStuks = 0;
geojson.features.forEach(f => {
  const p = f.properties;
  if (p.n_lopers > 0) totalLopers++;
  if (p.conflict) totalConflict++;
  p.lopers.forEach(l => { if (l.stuks) totalStuks += l.stuks; });
});
document.getElementById('stat-lopers').textContent = totalLopers;
document.getElementById('stat-conflict').textContent = totalConflict;
document.getElementById('stat-stuks').textContent = totalStuks.toLocaleString('nl');

// ── Legend ───────────────────────────────────────────────
const legend = L.control({position: 'bottomleft'});
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>Legenda</h4>
    <div class="legend-item"><div class="legend-box" style="background:#ff1f1f;border-color:#ff1f1f"></div> Conflict (2+ lopers)</div>
    <hr style="border-color:#444;margin:7px 0">
    ${Object.entries(SD_COLORS).filter(([k])=>k!=='Overig').map(([sd,c]) =>
      `<div class="legend-item"><div class="legend-box" style="background:${c};border-color:${c}"></div> ${sd}</div>`
    ).join('')}
    <hr style="border-color:#444;margin:7px 0">
    <div class="legend-item"><div class="legend-box" style="background:#888;opacity:0.3"></div> Geen loper</div>
  `;
  return div;
};
legend.addTo(map);

// ── Filters ──────────────────────────────────────────────
function applyFilters() {
  const showLoper    = document.getElementById('f-loper').checked;
  const showConflict = document.getElementById('f-conflict').checked;
  const showGeen     = document.getElementById('f-geen').checked;
  geoLayer.eachLayer(layer => {
    const p = layer.feature.properties;
    let show = false;
    if (p.conflict && showConflict) show = true;
    else if (!p.conflict && p.n_lopers === 1 && showLoper) show = true;
    else if (p.n_lopers === 0 && showGeen) show = true;
    layer.setStyle({ fillOpacity: show ? (p.conflict ? 0.7 : p.n_lopers ? LOPER_OPACITY : BASE_OPACITY) : 0, opacity: show ? 1 : 0 });
  });
}
['f-loper','f-conflict','f-geen'].forEach(id =>
  document.getElementById(id).addEventListener('change', applyFilters)
);
</script>
</body>
</html>
