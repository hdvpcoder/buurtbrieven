<html lang="nl">
<head>
<meta charset="UTF-8">

<title>GroenLinks Amsterdam – Flyerlijst</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111; color: #eee; }
#header {
  background: #1a5c30; color: #fff;
  padding: 10px 18px; display: flex; align-items: center; gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.5); position: relative; z-index: 1000;
}
#header h1 { font-size: 1rem; font-weight: 700; }
#header .sub { font-size: 0.75rem; opacity: .75; margin-top: 2px; }
#stats { display: flex; gap: 18px; margin-left: auto; }
#stats .s { text-align: center; }
#stats .n { font-size: 1.15rem; font-weight: 800; }
#stats .l { font-size: 0.7rem; opacity: .8; }
.legend {
  background: rgba(20,20,20,.93); border: 1px solid #444;
  border-radius: 8px; padding: 11px 14px; font-size: 11.5px; color: #ddd; min-width: 165px;
}
.legend h4 { color: #fff; font-size: 12.5px; margin-bottom: 8px; }
.li { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.lb { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,.25); }
hr.leg { border: none; border-top: 1px solid #444; margin: 6px 0; }
.leaflet-popup-content-wrapper {
  background: #1c1c1c; color: #eee;
  border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.6); border: 1px solid #3a3a3a;
}
.leaflet-popup-tip { background: #1c1c1c; }
.pc { font-size: 1.15rem; font-weight: 700; }
.sd { font-size: .72rem; color: #999; margin-bottom: 8px; }
.lrij { padding: 5px 0; border-bottom: 1px solid #2e2e2e; }
.lrij:last-child { border: none; }
.lnaam { font-weight: 600; font-size: .9rem; }
.ldet { font-size: .73rem; color: #aaa; margin-top: 2px; }
.tag { display:inline-block; padding: 1px 6px; border-radius: 8px; font-size: .68rem;
        font-weight: 700; background: #1e3d1e; color: #7dcc7d; margin-left: 4px; }
.conflict-badge { color: #ff6060; font-size: .75rem; font-weight: 700; margin-bottom: 7px; }
.geen { color: #666; font-style: italic; font-size: .85rem; padding: 4px 0; }
#bijgewerkt { position: absolute; bottom: 6px; right: 10px; font-size: 10px;
               color: rgba(255,255,255,.35); z-index: 999; pointer-events: none; }
#filter-btn {
  background: rgba(255,255,255,.15); border: none; color: #fff;
  padding: 5px 11px; border-radius: 6px; cursor: pointer; font-size: .8rem;
  margin-left: 12px; white-space: nowrap;
}
#filter-btn:hover { background: rgba(255,255,255,.25); }
#map-wrap { position: relative; display: flex; height: calc(100vh - 52px); overflow: hidden; }
#map { flex: 1; height: 100%; }
#filter-panel {
  width: 230px; min-width: 230px; background: rgba(18,18,18,.97);
  border-left: 1px solid #333; overflow-y: auto; padding: 10px 0;
  display: none;
}
#filter-panel.open { display: block; }
.fp-top { display: flex; align-items: center; padding: 6px 14px 10px;
           border-bottom: 1px solid #2a2a2a; margin-bottom: 6px; }
.fp-top span { font-size: .8rem; font-weight: 700; color: #ccc; flex: 1; }
.fp-alles { display: flex; gap: 5px; }
.fp-alles button {
  background: #2a2a2a; border: 1px solid #444; color: #bbb;
  font-size: .65rem; padding: 2px 8px; border-radius: 4px; cursor: pointer;
}
.fp-alles button:hover { background: #3a3a3a; color: #fff; }
.fp-sd { padding: 6px 8px 2px; }
.fp-sd-head {
  display: flex; align-items: center; gap: 6px;
  font-size: .7rem; font-weight: 700; color: #aaa;
  text-transform: uppercase; letter-spacing: .04em;
  padding: 3px 6px; margin-bottom: 3px;
}
.fp-sd-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
.fp-sd-btns { margin-left: auto; display: flex; gap: 4px; }
.fp-sd-btns button {
  background: #222; border: 1px solid #3a3a3a; color: #999;
  font-size: .6rem; padding: 1px 5px; border-radius: 3px; cursor: pointer;
}
.fp-sd-btns button:hover { background: #333; color: #fff; }
.fp-row {
  display: flex; align-items: center; gap: 7px;
  padding: 3px 8px 3px 18px; cursor: pointer;
  border-radius: 4px; margin: 1px 4px;
  transition: background .1s;
}
.fp-row:hover { background: #222; }
.fp-row input[type=checkbox] { accent-color: #4caf50; cursor: pointer; flex-shrink: 0; }
.fp-pc { font-size: .82rem; flex: 1; }
.fp-badge {
  font-size: .6rem; padding: 1px 5px; border-radius: 8px; font-weight: 700;
}
.fp-badge.c { background: #7a1010; color: #ff9090; }
.fp-badge.l { background: #1e3d1e; color: #7dcc7d; }
.fp-badge.g { color: #555; font-style: italic; font-size: .6rem; }
hr.fp-sep { border: none; border-top: 1px solid #222; margin: 4px 0; }
</style>

const bin = atob(b64geo);
const bytes = new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
const geoBase = JSON.parse(pako.inflate(bytes, {to:"string"}));

const map = L.map("map",{center:[52.37,4.90],zoom:12});

}).addTo(map);

let geoLayer;
let layersByPc = {};    // pc -> leaflet layer
let styleByPc = {};     // pc -> computed style
let hiddenPcs = new Set();
let allFeatures = [];

function togglePanel() {
  const p = document.getElementById("filter-panel");
  p.classList.toggle("open");
  setTimeout(()=>map.invalidateSize(), 280);
}

function toggleAll(show) {
  document.querySelectorAll(".fp-cb").forEach(cb => {
    cb.checked = show;
    const pc = cb.dataset.pc;
    if(show) hiddenPcs.delete(pc);
    else hiddenPcs.add(pc);
    applyVisibility(pc);
  });
}

function toggleSd(sd, show) {
  document.querySelectorAll(`.fp-cb[data-sd="${sd}"]`).forEach(cb => {
    cb.checked = show;
    const pc = cb.dataset.pc;
    if(show) hiddenPcs.delete(pc);
    else hiddenPcs.add(pc);
    applyVisibility(pc);
  });
}

function applyVisibility(pc) {
  const layer = layersByPc[pc];
  if(!layer) return;
  if(hiddenPcs.has(pc)) {
    layer.setStyle({opacity:0, fillOpacity:0, weight:0});
    layer.closePopup();
  } else {
    layer.setStyle(styleByPc[pc]);
  }
}

function buildPanel(features) {
  const sdOrder = ["Centrum","Noord","West","Nieuw-West","Zuid","Oost","Zuidoost","Overig"];
  const bySD = {};
  features.forEach(f => {
    const p = f.properties;
    if(!bySD[p.stadsdeel]) bySD[p.stadsdeel] = [];
    bySD[p.stadsdeel].push(p);
  });
  sdOrder.forEach(sd => { if(!bySD[sd]) return; bySD[sd].sort((a,b)=>a.pc4-b.pc4); });

  let html = "";
  sdOrder.forEach(sd => {
    if(!bySD[sd] || !bySD[sd].length) return;
    const col = SD_COL[sd] || "#666";
    html += `<div class="fp-sd">
      <div class="fp-sd-head">
        <div class="fp-sd-dot" style="background:${col}"></div>
        ${sd}
        <div class="fp-sd-btns">
          <button onclick="toggleSd('${sd}',true)">✓</button>
          <button onclick="toggleSd('${sd}',false)">✗</button>
        </div>
      </div>`;
    bySD[sd].forEach(p => {
      const badge = p.conflict
        ? `<span class="fp-badge c">conflict</span>`
        : p.n === 1 ? `<span class="fp-badge l">${p.lopers[0].naam.split(" ")[0]}</span>`
        : `<span class="fp-badge g">leeg</span>`;
      html += `<label class="fp-row">
        <input type="checkbox" class="fp-cb" data-pc="${p.pc4}" data-sd="${p.stadsdeel}"
          checked onchange="onCbChange(this)">
        <span class="fp-pc">${p.pc4}</span>
        ${badge}
      </label>`;
    });
    html += `</div><hr class="fp-sep">`;
  });
  document.getElementById("fp-content").innerHTML = html;
}

function onCbChange(cb) {
  const pc = cb.dataset.pc;
  if(cb.checked) hiddenPcs.delete(pc);
  else hiddenPcs.add(pc);
  applyVisibility(pc);
}

function buildMap(lopers) {
  if(geoLayer) map.removeLayer(geoLayer);
  layersByPc = {};
  styleByPc = {};

  const features = geoBase.features.map(f => {
    const pc = f.properties.pc4;
    const ll = lopers[pc] || [];
    return {...f, properties: {
      ...f.properties,
      lopers: ll,
      n: ll.length,
      conflict: ll.length > 1
    }};
  });
  allFeatures = features;
  const geojson = {type:"FeatureCollection", features};

  function style(f) {
    const p=f.properties, c=SD_COL[p.stadsdeel]||"#666";
    if(p.conflict)   return {fillColor:CONFLICT, fillOpacity:.72, color:CONFLICT, weight:2.5, opacity:1};
    if(p.n===1)      return {fillColor:c, fillOpacity:.65, color:c, weight:2, opacity:1};
    return               {fillColor:c, fillOpacity:.15, color:c, weight:.8, opacity:.55};
  }

  function popup(p) {
    let h=`<div class="pc">${p.pc4}</div><div class="sd">${p.stadsdeel}</div>`;
    if(p.conflict) h+=`<div class="conflict-badge">⚠️ CONFLICT — ${p.n} lopers</div>`;
    if(!p.n) { h+=`<div class="geen">Geen loper</div>`; return h; }
    p.lopers.forEach(l=>{
      h+=`<div class="lrij">
        <div class="lnaam">${l.naam}</div>
        <div class="ldet">${l.stuks?l.stuks+" stuks · ":" "}<span class="tag">${l.type}</span></div>
      </div>`;
    });
    return h;
  }

  function tooltip(p) {
    let h=`<strong>${p.pc4}</strong>`;
    if(!p.n) return h+`<br><em style="color:#999">Geen loper</em>`;
    if(p.conflict) h+=` <span style="color:#c0392b">⚠️</span>`;
    p.lopers.forEach(l=>{ h+=`<br>${l.naam}`; });
    return h;
  }

  geoLayer = L.geoJSON(geojson,{
    style,
    onEachFeature(feat,layer) {
      const pc = feat.properties.pc4;
      layersByPc[pc] = layer;
      styleByPc[pc] = style(feat);
      layer.bindPopup(popup(feat.properties),{maxWidth:270});
      layer.bindTooltip(tooltip(feat.properties),{sticky:true, direction:'top', opacity:0.92});
      layer.on({
        mouseover(e) {
          if(hiddenPcs.has(pc)) return;
          const p=feat.properties, l=e.target, c=SD_COL[p.stadsdeel]||"#666";
          l.setStyle(p.conflict
            ?{fillOpacity:.9,weight:3.5}
            :p.n?{fillOpacity:.85,weight:3}:{fillOpacity:.35,weight:1.5});
          l.bringToFront();
        },
        mouseout(e)  { if(!hiddenPcs.has(pc)) geoLayer.resetStyle(e.target); },
        click(e)     { if(!hiddenPcs.has(pc)) map.fitBounds(e.target.getBounds(),{padding:[50,50]}); }
      });
    }
  }).addTo(map);

  // Stats
  let nL=0,nC=0,nS=0;
  features.forEach(f=>{
    const p=f.properties;
    if(p.n>0) nL++;
    if(p.conflict) nC++;
    p.lopers.forEach(l=>{ if(l.stuks) nS+=l.stuks; });
  });
  document.getElementById("sn-lopers").textContent=nL;
  document.getElementById("sn-conflict").textContent=nC;
  document.getElementById("sn-stuks").textContent=nS.toLocaleString("nl");

  buildPanel(features);
}

// Laad data.json
fetch("data.json?v=" + Date.now())
  .then(r=>r.json())
  .then(d=>{
    buildMap(d.lopers);
    document.getElementById("sub").textContent = "Bijgewerkt: " + d.bijgewerkt;
    document.getElementById("bijgewerkt").textContent = "Data: " + d.bijgewerkt;
  })
  .catch(()=>{
    buildMap({});
    document.getElementById("sub").textContent="⚠️ data.json niet gevonden";
  });

// Legenda
const leg=L.control({position:"bottomleft"});
leg.onAdd=()=>{
  const d=L.DomUtil.create("div","legend");
  d.innerHTML=`<h4>Legenda</h4>
    <div class="li"><div class="lb" style="background:${CONFLICT}"></div> ⚠️ Conflict</div>
    <hr class="leg">
    ${Object.entries(SD_COL).filter(([k])=>k!=="Overig").map(([s,c])=>
      `<div class="li"><div class="lb" style="background:${c}"></div> ${s}</div>`
    ).join("")}
    <hr class="leg">
    <div class="li"><div class="lb" style="background:#555;opacity:.4"></div> Geen loper</div>`;
  return d;
};
leg.addTo(map);
</script>
